<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Foto Stock → Airtable</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; color: #f0f0f0; font-family: 'Inter', -apple-system, sans-serif; min-height: 100vh; }

    .header { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid #1e1e1e; }
    .logo { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.5px; }
    .logo span { color: #c8ff00; }
    .record-badge { font-size: 0.75rem; padding: 6px 14px; border-radius: 999px; background: #1a1a1a; border: 1px solid #333; color: #aaa; }
    .record-badge.error { border-color: #ff4444; color: #ff6666; }
    .record-badge.ok { border-color: #444; color: #ccc; }

    .search-area { padding: 20px 24px 12px; }
    .search-row { display: flex; gap: 10px; }
    .search-input {
      flex: 1; padding: 12px 18px; border-radius: 10px;
      background: #141414; border: 1px solid #2a2a2a; color: #f0f0f0;
      font-size: 1rem; outline: none; transition: border-color .2s;
    }
    .search-input:focus { border-color: #c8ff00; }
    .search-input::placeholder { color: #555; }
    .btn-search {
      padding: 12px 24px; border-radius: 10px; border: none; cursor: pointer;
      background: #c8ff00; color: #0a0a0a; font-weight: 700; font-size: 1rem;
      transition: opacity .2s;
    }
    .btn-search:hover { opacity: .85; }
    .btn-search:disabled { opacity: .4; cursor: not-allowed; }

    .filters { display: flex; gap: 8px; padding: 0 24px 16px; flex-wrap: wrap; }
    .filter-btn {
      padding: 5px 14px; border-radius: 999px; border: 1px solid #2a2a2a;
      background: transparent; color: #888; font-size: 0.75rem; cursor: pointer;
      letter-spacing: .05em; text-transform: uppercase; font-weight: 600; transition: all .2s;
    }
    .filter-btn.active { background: #c8ff00; color: #0a0a0a; border-color: #c8ff00; }

    #content { padding: 0 24px 100px; }
    .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
    .photo-card {
      position: relative; border-radius: 10px; overflow: hidden; cursor: pointer;
      aspect-ratio: 3/2; border: 2px solid transparent; transition: border-color .15s;
    }
    .photo-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .photo-card.selected { border-color: #c8ff00; }
    .photo-card .badge {
      position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,.6);
      color: #fff; font-size: 0.6rem; padding: 2px 7px; border-radius: 999px;
      text-transform: uppercase; font-weight: 700; letter-spacing: .05em;
    }
    .badge.pixabay { background: rgba(30,100,30,.8); }
    .badge.wikimedia { background: rgba(0,60,120,.8); }
    .photo-card .check {
      position: absolute; top: 8px; right: 8px; width: 22px; height: 22px;
      background: #c8ff00; border-radius: 50%; display: none; align-items: center;
      justify-content: center; color: #000; font-size: 13px; font-weight: 900;
    }
    .photo-card.selected .check { display: flex; }

    .empty { text-align: center; color: #444; padding: 60px 0; font-size: 0.95rem; line-height: 2; }
    .loading { text-align: center; padding: 60px 0; }
    .spinner { width: 36px; height: 36px; border: 3px solid #222; border-top-color: #c8ff00;
      border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #111; border-top: 1px solid #1e1e1e;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 24px; transform: translateY(100%); transition: transform .25s;
    }
    .bottom-bar.visible { transform: translateY(0); }
    .selection-count { font-size: 0.85rem; color: #aaa; }
    .selection-count strong { color: #c8ff00; }
    .bar-actions { display: flex; gap: 10px; }
    .btn-clear { padding: 8px 16px; border-radius: 8px; border: 1px solid #333; background: transparent; color: #888; cursor: pointer; font-size: 0.85rem; }
    .btn-insert {
      display: flex; align-items: center; gap: 7px;
      padding: 8px 20px; border-radius: 8px; border: none;
      background: #c8ff00; color: #0a0a0a; font-weight: 700; cursor: pointer; font-size: 0.85rem;
    }
    .btn-insert:disabled { opacity: .4; cursor: not-allowed; }

    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
      padding: 10px 20px; border-radius: 8px; font-size: 0.85rem; font-weight: 600;
      opacity: 0; transition: all .3s; pointer-events: none; white-space: nowrap;
    }
    .toast.success { background: #1a3a1a; color: #6fff6f; border: 1px solid #2a5a2a; }
    .toast.error { background: #3a1a1a; color: #ff6f6f; border: 1px solid #5a2a2a; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">Foto<span>Stock</span> → Airtable</div>
  <div class="record-badge error" id="recordBadge">⚠ Nessun record — apri da Airtable</div>
</div>

<div class="search-area">
  <div class="search-row">
    <input type="text" class="search-input" id="searchInput" placeholder="Es: dubai skyline, business meeting, entrepreneur...">
    <button class="btn-search" id="searchBtn" onclick="doSearch()">Cerca →</button>
  </div>
</div>

<div class="filters">
  <button class="filter-btn active" id="filter-all" onclick="setFilter('all')">Tutte</button>
  <button class="filter-btn" id="filter-unsplash" onclick="setFilter('unsplash')">Unsplash</button>
  <button class="filter-btn" id="filter-pexels" onclick="setFilter('pexels')">Pexels</button>
  <button class="filter-btn" id="filter-pixabay" onclick="setFilter('pixabay')">Pixabay</button>
  <button class="filter-btn" id="filter-wikimedia" onclick="setFilter('wikimedia')">Wikipedia</button>
</div>

<div id="content">
  <div class="empty">Inserisci una keyword e premi Cerca</div>
</div>

<div class="bottom-bar" id="bottomBar">
  <div class="selection-count"><strong id="selCount">0</strong> foto selezionate</div>
  <div class="bar-actions">
    <button class="btn-clear" onclick="clearSelection()">Deseleziona tutto</button>
    <button class="btn-insert" id="insertBtn" onclick="insertToAirtable()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      Inserisci in Airtable
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const WORKER = 'https://cool-truth-2171foto-stock.cristiano-volpi-account.workers.dev';
  const PER_SOURCE = 15;

  let allPhotos = [], selectedPhotos = new Set(), currentFilter = 'all', recordId = null;

  window.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    recordId = params.get('recordId');
    const badge = document.getElementById('recordBadge');
    if (recordId) {
      badge.textContent = 'Record: ' + recordId.slice(0, 10) + '...';
      badge.className = 'record-badge ok';
    }
    document.getElementById('searchInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') doSearch();
    });
  });

  async function doSearch() {
    const query = document.getElementById('searchInput').value.trim();
    if (!query) return;
    selectedPhotos.clear(); updateBottomBar(); showLoading();
    const [u, p, px, wm] = await Promise.allSettled([
      searchUnsplash(query),
      searchPexels(query),
      searchPixabay(query),
      searchWikimedia(query)
    ]);
    allPhotos = [];
    if (u.status === 'fulfilled') allPhotos.push(...u.value);
    if (p.status === 'fulfilled') allPhotos.push(...p.value);
    if (px.status === 'fulfilled') allPhotos.push(...px.value);
    if (wm.status === 'fulfilled') allPhotos.push(...wm.value);
    allPhotos = shuffle(allPhotos);
    renderGrid(); updateInfo();
  }

  async function searchUnsplash(query) {
    const res = await fetch(`${WORKER}/unsplash?q=${encodeURIComponent(query)}&per_page=${PER_SOURCE}`);
    if (!res.ok) throw new Error('Unsplash error');
    const data = await res.json();
    return data.results.map(p => ({
      id: 'u_' + p.id, source: 'unsplash',
      thumb: p.urls.small, full: p.urls.regular,
      downloadUrl: p.links.download_location,
      filename: `unsplash-${p.id}.jpg`
    }));
  }

  async function searchPexels(query) {
    const res = await fetch(`${WORKER}/pexels?q=${encodeURIComponent(query)}&per_page=${PER_SOURCE}`);
    if (!res.ok) throw new Error('Pexels error');
    const data = await res.json();
    return data.photos.map(p => ({
      id: 'p_' + p.id, source: 'pexels',
      thumb: p.src.medium, full: p.src.large,
      downloadUrl: null, filename: `pexels-${p.id}.jpg`
    }));
  }

  async function searchPixabay(query) {
    const res = await fetch(`${WORKER}/pixabay?q=${encodeURIComponent(query)}&per_page=${PER_SOURCE}`);
    if (!res.ok) throw new Error('Pixabay error');
    const data = await res.json();
    return (data.hits || []).map(p => ({
      id: 'px_' + p.id, source: 'pixabay',
      thumb: p.previewURL, full: p.largeImageURL,
      downloadUrl: null, filename: `pixabay-${p.id}.jpg`
    }));
  }

  async function searchWikimedia(query) {
    const res = await fetch(`${WORKER}/wikimedia?q=${encodeURIComponent(query)}&per_page=${PER_SOURCE}`);
    if (!res.ok) throw new Error('Wikimedia error');
    const data = await res.json();
    return (data.photos || []).map(p => ({
      id: 'wm_' + p.id, source: 'wikimedia',
      thumb: p.thumb, full: p.full,
      downloadUrl: null, filename: p.filename
    }));
  }

  function renderGrid() {
    const filtered = currentFilter === 'all' ? allPhotos : allPhotos.filter(p => p.source === currentFilter);
    if (filtered.length === 0) {
      document.getElementById('content').innerHTML = '<div class="empty">Nessuna foto trovata.</div>';
      return;
    }
    const grid = document.createElement('div');
    grid.className = 'photo-grid';
    filtered.forEach(photo => {
      const card = document.createElement('div');
      card.className = 'photo-card' + (selectedPhotos.has(photo.id) ? ' selected' : '');
      card.dataset.id = photo.id;
      card.onclick = () => togglePhoto(photo.id);
      card.innerHTML = `
        <img src="${photo.thumb}" loading="lazy" alt="">
        <span class="badge ${photo.source}">${photo.source}</span>
        <span class="check">✓</span>`;
      grid.appendChild(card);
    });
    document.getElementById('content').innerHTML = '';
    document.getElementById('content').appendChild(grid);
  }

  function togglePhoto(id) {
    if (selectedPhotos.has(id)) selectedPhotos.delete(id);
    else selectedPhotos.add(id);
    const card = document.querySelector(`.photo-card[data-id="${id}"]`);
    if (card) card.classList.toggle('selected', selectedPhotos.has(id));
    updateBottomBar();
  }

  function clearSelection() {
    selectedPhotos.clear();
    document.querySelectorAll('.photo-card.selected').forEach(c => c.classList.remove('selected'));
    updateBottomBar();
  }

  function updateBottomBar() {
    const count = selectedPhotos.size;
    document.getElementById('selCount').textContent = count;
    document.getElementById('bottomBar').classList.toggle('visible', count > 0);
  }

  function updateInfo() {
    const counts = { unsplash: 0, pexels: 0, pixabay: 0, wikimedia: 0 };
    allPhotos.forEach(p => counts[p.source]++);
    document.getElementById('filter-unsplash').textContent = `Unsplash (${counts.unsplash})`;
    document.getElementById('filter-pexels').textContent = `Pexels (${counts.pexels})`;
    document.getElementById('filter-pixabay').textContent = `Pixabay (${counts.pixabay})`;
    document.getElementById('filter-wikimedia').textContent = `Wikipedia (${counts.wikimedia})`;
  }

  function setFilter(f) {
    currentFilter = f;
    ['all', 'unsplash', 'pexels', 'pixabay', 'wikimedia'].forEach(x =>
      document.getElementById('filter-' + x).classList.toggle('active', x === f));
    renderGrid();
  }

  async function insertToAirtable() {
    if (!recordId) { showToast('Nessun record Airtable — apri da Airtable', 'error'); return; }
    const btn = document.getElementById('insertBtn');
    btn.disabled = true; btn.textContent = 'Inserimento...';

    const photos = allPhotos.filter(p => selectedPhotos.has(p.id));
    const attachments = [];

    for (const photo of photos) {
      if (photo.source === 'unsplash' && photo.downloadUrl) {
        await fetch(`${WORKER}/unsplash-download`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ downloadUrl: photo.downloadUrl })
        });
      }
      attachments.push({ url: photo.full, filename: photo.filename });
    }

    try {
      const res = await fetch(`${WORKER}/airtable`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ recordId, attachments })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Errore Airtable');
      showToast(`${attachments.length} foto inserite nel record!`, 'success');
      clearSelection();
    } catch (err) {
      showToast(err.message, 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Inserisci in Airtable';
    }
  }

  function showLoading() {
    document.getElementById('content').innerHTML = '<div class="loading"><div class="spinner"></div><div style="color:#555;font-size:.85rem">Ricerca in corso...</div></div>';
  }

  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast ' + (type || 'success');
    setTimeout(() => t.classList.add('show'), 10);
    setTimeout(() => t.classList.remove('show'), 3500);
  }

  function shuffle(a) {
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }
</script>
</body>
</html>
